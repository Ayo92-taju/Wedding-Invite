<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf8" />
      <stop offset="0.5" stop-color="#f7f1e6" />
      <stop offset="1" stop-color="#efe5d3" />
    </linearGradient>
    <radialGradient id="blush" cx="18%" cy="14%" r="55%">
      <stop offset="0" stop-color="#faecea" />
      <stop offset="1" stop-color="#faecea" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="sage" cx="86%" cy="84%" r="55%">
      <stop offset="0" stop-color="#d8e0cb" />
      <stop offset="1" stop-color="#d8e0cb" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#blush)" />
  <rect width="1200" height="630" fill="url(#sage)" />
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#c9a227" stroke-opacity="0.5" />

  <text x="600" y="210" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
    font-size="34" letter-spacing="14" fill="#6f7f5e">TOGETHER IN FULL BLOOM</text>

  <text x="600" y="350" text-anchor="middle" font-family="'Brush Script MT', 'Snell Roundhand', cursive"
    font-size="150" fill="#a4615d">Nimi &amp; Victor</text>

  <!-- divider with central bloom -->
  <line x1="430" y1="410" x2="560" y2="410" stroke="#c9a227" stroke-opacity="0.6" />
  <line x1="640" y1="410" x2="770" y2="410" stroke="#c9a227" stroke-opacity="0.6" />
  <g transform="translate(600 410)">
    <g fill="#f4ddd8" stroke="#c9a227" stroke-width="1.4">
      <ellipse cx="0" cy="-11" rx="4.4" ry="10" />
      <ellipse cx="0" cy="-11" rx="4.4" ry="10" transform="rotate(72)" />
      <ellipse cx="0" cy="-11" rx="4.4" ry="10" transform="rotate(144)" />
      <ellipse cx="0" cy="-11" rx="4.4" ry="10" transform="rotate(216)" />
      <ellipse cx="0" cy="-11" rx="4.4" ry="10" transform="rotate(288)" />
    </g>
    <circle r="4.2" fill="#c9a227" />
  </g>

  <text x="600" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="30"
    letter-spacing="8" fill="#4a3f37">SATURDAY · 10 OCTOBER 2026</text>
</svg>
