<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Nimi &amp; Victor — Love in Full Bloom</title>
    <meta
      name="description"
      content="Nimi & Victor are getting married. Step into our garden in full bloom — our love story, the celebration details, and a gentle place to RSVP."
    />
    <meta name="theme-color" content="#f7f1e6" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nimi & Victor — Love in Full Bloom" />
    <meta
      property="og:description"
      content="Step into our garden in full bloom. Our love story, the celebration details, and your invitation await."
    />
    <meta property="og:image" content="/og-image.svg" />

    <!-- Fonts: Fraunces (display) · EB Garamond (body) · Pinyon Script (names) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Pinyon+Script&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      Hidden static forms so Netlify can detect and wire up form handling at build time.
      The live React forms post to these endpoints. Do not remove.
    -->
    <form name="rsvp" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="attending" />
      <input type="number" name="guests" />
      <textarea name="message"></textarea>
    </form>
    <form name="love-notes" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
